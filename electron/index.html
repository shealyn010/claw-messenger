<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Messenger - OpenClaw多渠道通知系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
        }

        .tab:hover {
            background: #e8e8e8;
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .content {
            padding: 30px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(56, 239, 125, 0.4);
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .channel-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-right: 8px;
        }

        .channel-feishu {
            background: #00d0b0;
            color: white;
        }

        .channel-webui {
            background: #667eea;
            color: white;
        }

        .message-history {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .message-item {
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 8px;
        }

        .message-item:last-child {
            border-bottom: none;
        }

        .message-time {
            font-size: 12px;
            color: #999;
        }

        .message-content {
            margin-top: 4px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦞 Claw Messenger</h1>
            <p>OpenClaw多渠道通知系统 - Web UI挂了还有飞书！</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('config')">⚙️ 配置</button>
            <button class="tab" onclick="showTab('send')">📤 发消息</button>
            <button class="tab" onclick="showTab('status')">📊 状态</button>
        </div>

        <div class="content">
            <div id="config" class="tab-content active">
                <h2 style="margin-bottom: 20px; color: #333;">🔗 飞书配置</h2>
                
                <div class="form-group">
                    <label>App ID</label>
                    <input type="text" id="feishuAppId" placeholder="请输入飞书App ID">
                </div>

                <div class="form-group">
                    <label>App Secret</label>
                    <input type="password" id="feishuAppSecret" placeholder="请输入飞书App Secret">
                </div>

                <div class="form-group">
                    <label>Chat ID</label>
                    <input type="text" id="feishuChatId" placeholder="请输入飞书群聊Chat ID">
                </div>

                <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
                <div id="configStatus" class="status"></div>
            </div>

            <div id="send" class="tab-content">
                <h2 style="margin-bottom: 20px; color: #333;">📤 发送消息</h2>
                
                <div class="form-group">
                    <label>选择渠道</label>
                    <div>
                        <span class="channel-badge channel-feishu">飞书</span>
                        <span class="channel-badge channel-webui" style="opacity: 0.5;">Web UI (开发中)</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>消息内容</label>
                    <textarea id="messageContent" rows="4" placeholder="请输入要发送的消息..."></textarea>
                </div>

                <button class="btn btn-success" onclick="sendMessage()">🚀 发送消息</button>
                <div id="sendStatus" class="status"></div>

                <div id="messageHistory" class="message-history" style="display: none;">
                    <h3 style="margin-bottom: 15px; color: #333; font-size: 16px;">📜 历史记录</h3>
                    <div id="historyList"></div>
                </div>
            </div>

            <div id="status" class="tab-content">
                <h2 style="margin-bottom: 20px; color: #333;">📊 系统状态</h2>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div style="background: #f5f5f5; padding: 20px; border-radius: 8px;">
                        <h3 style="margin-bottom: 10px; color: #333;">🦞 飞书渠道</h3>
                        <p id="feishuStatus" style="color: #666;">未配置</p>
                    </div>
                    
                    <div style="background: #f5f5f5; padding: 20px; border-radius: 8px;">
                        <h3 style="margin-bottom: 10px; color: #333;">🌐 Web UI</h3>
                        <p style="color: #666;">开发中...</p>
                    </div>
                </div>

                <div style="margin-top: 30px; padding: 20px; background: #f0f7ff; border-radius: 8px;">
                    <h3 style="margin-bottom: 10px; color: #333;">💡 下一步</h3>
                    <ul style="color: #666; margin-left: 20px; line-height: 1.8;">
                        <li>配置飞书App ID、App Secret和Chat ID</li>
                        <li>保存配置</li>
                        <li>测试发送消息</li>
                        <li>开始使用！</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        let messageHistory = [];

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        async function loadConfig() {
            const result = await ipcRenderer.invoke('load-config');
            if (result.success && result.config) {
                document.getElementById('feishuAppId').value = result.config.feishuAppId || '';
                document.getElementById('feishuAppSecret').value = result.config.feishuAppSecret || '';
                document.getElementById('feishuChatId').value = result.config.feishuChatId || '';
                updateStatus(result.config);
            }
        }

        async function saveConfig() {
            const config = {
                feishuAppId: document.getElementById('feishuAppId').value,
                feishuAppSecret: document.getElementById('feishuAppSecret').value,
                feishuChatId: document.getElementById('feishuChatId').value,
            };

            const result = await ipcRenderer.invoke('save-config', config);
            const statusEl = document.getElementById('configStatus');
            
            if (result.success) {
                statusEl.className = 'status success';
                statusEl.textContent = '✅ 配置保存成功！';
                updateStatus(config);
            } else {
                statusEl.className = 'status error';
                statusEl.textContent = '❌ 保存失败：' + result.error;
            }

            setTimeout(() => statusEl.classList.remove('success', 'error'), 3000);
        }

        async function sendMessage() {
            const config = {
                feishuAppId: document.getElementById('feishuAppId').value,
                feishuAppSecret: document.getElementById('feishuAppSecret').value,
                feishuChatId: document.getElementById('feishuChatId').value,
            };

            const message = document.getElementById('messageContent').value;
            const statusEl = document.getElementById('sendStatus');

            if (!message) {
                statusEl.className = 'status error';
                statusEl.textContent = '❌ 请输入消息内容！';
                return;
            }

            const result = await ipcRenderer.invoke('send-message', {
                channel: 'feishu',
                message: message,
                config: config
            });

            if (result.success) {
                statusEl.className = 'status success';
                statusEl.textContent = '✅ 消息发送成功！';
                
                addToHistory(message);
                document.getElementById('messageContent').value = '';
            } else {
                statusEl.className = 'status error';
                statusEl.textContent = '❌ 发送失败：' + result.error;
            }

            setTimeout(() => statusEl.classList.remove('success', 'error'), 3000);
        }

        function addToHistory(message) {
            const now = new Date();
            messageHistory.unshift({
                time: now.toLocaleString('zh-CN'),
                content: message
            });

            const historyEl = document.getElementById('messageHistory');
            const listEl = document.getElementById('historyList');
            
            historyEl.style.display = 'block';
            listEl.innerHTML = messageHistory.slice(0, 10).map(item => `
                <div class="message-item">
                    <div class="message-time">${item.time}</div>
                    <div class="message-content">${item.content}</div>
                </div>
            `).join('');
        }

        function updateStatus(config) {
            const feishuStatus = document.getElementById('feishuStatus');
            if (config.feishuAppId && config.feishuAppSecret && config.feishuChatId) {
                feishuStatus.innerHTML = '<span style="color: #38ef7d;">✅ 已配置</span>';
            } else {
                feishuStatus.innerHTML = '<span style="color: #ff6b6b;">❌ 未配置</span>';
            }
        }

        loadConfig();
    </script>
</body>
</html>
